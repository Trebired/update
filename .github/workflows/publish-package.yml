name: Publish Package

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build and optionally publish
        required: false
        default: main
      publish_to_npm:
        description: Publish to npm after testing and building
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-package-${{ github.event.inputs.ref || github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_to_npm == 'true')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Verify pushed tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_NAME="${GITHUB_REF_NAME}"
          EXPECTED_TAG="v${PKG_VERSION}"
          if [ "$TAG_NAME" != "$EXPECTED_TAG" ]; then
            echo "release tag $TAG_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Verify manual publish ref version
        if: github.event_name == 'workflow_dispatch'
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "manual publish for ref '${{ github.event.inputs.ref }}' with package version ${PKG_VERSION}"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test and build package
        run: |
          bun run typecheck
          bun test
          bun run build

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
